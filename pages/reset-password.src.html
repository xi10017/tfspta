<!DOCTYPE html>
<html lang="en">
<html-head
  page-title="Reset password"
  page-description="Choose a new password for your Frazer School PTA account.">
</html-head>
<body class="page-reset-password">
  <site-header school-name="Frazer School PTA"></site-header>

  <main id="main-content">
    <page-hero
      title="Reset password"
      subtitle="Choose a new password for your account.">
    </page-hero>

    <section class="section workflow-section">
      <div class="container workflow-container">
        <div id="config-notice" class="notice-card" hidden>
          <h2>Setup required</h2>
          <p>Configure Supabase (<code>supabase-config.js</code>) before using password reset.</p>
        </div>

        <div id="reset-panel" class="card workflow-card" hidden>
          <h2>New password</h2>
          <div id="reset-message" class="alert-banner" hidden></div>
          <form id="reset-form" class="stack-form">
            <div class="form-field">
              <label for="new-password">New password</label>
              <input id="new-password" name="new-password" type="password" required minlength="8" autocomplete="new-password">
            </div>
            <div class="form-field">
              <label for="confirm-password">Confirm password</label>
              <input id="confirm-password" name="confirm-password" type="password" required minlength="8" autocomplete="new-password">
            </div>
            <button class="btn btn-primary" type="submit">Update password</button>
          </form>
        </div>

        <div id="invalid-panel" class="notice-card" hidden>
          <h2>Link expired or invalid</h2>
          <p>This reset link may have expired or already been used. Request a new one from the sign-in page.</p>
          <p><a class="btn btn-primary" href="submit.html">Go to sign in</a></p>
        </div>
      </div>
    </section>
  </main>

  <site-footer
    organization-name="Frazer School PTA"
    year="2025">
  </site-footer>
  <script src="assets/main.js"></script>
  <script type="module" src="assets/reset-password.js"></script>
</body>
</html>
