<article class="club-entry" id="{{slug}}">
  <h4>{{name}}</h4>
  <p class="entry-description">{{description}}</p>
  <dl class="entry-details">
    <div>
      <dt>Contact</dt>
      <dd>{{contact}}</dd>
    </div>
    <div>
      <dt>Eligibility</dt>
      <dd>{{eligibility}}</dd>
    </div>
    <div>
      <dt>Schedule</dt>
      <dd>{{period}}</dd>
    </div>
  </dl>
  <p class="entry-notes">{{notes}}</p>
  <p class="entry-link-wrap"><a class="entry-link" href="{{link}}">Learn more →</a></p>
</article>
