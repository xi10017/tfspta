<article class="competition-entry" id="{{slug}}">
  <div class="entry-header">
    <h4>{{name}}</h4>
    <span class="entry-level">{{level}}</span>
  </div>
  <p class="entry-description">{{description}}</p>
  <dl class="entry-details">
    <div>
      <dt>Format</dt>
      <dd>{{format}}</dd>
    </div>
    <div>
      <dt>Coach / contact</dt>
      <dd>{{contact}}</dd>
    </div>
    <div>
      <dt>Eligibility</dt>
      <dd>{{eligibility}}</dd>
    </div>
    <div>
      <dt>Season</dt>
      <dd>{{period}}</dd>
    </div>
  </dl>
  <p class="entry-link-wrap"><a class="entry-link" href="{{link}}">Official information →</a></p>
</article>
