<section class="section events">
  <div class="container">
    <div id="contextual-submit" class="contextual-submit" hidden></div>
    <div id="calendar-live" aria-live="polite"></div>

    <div id="calendar-static-fallback" hidden>
    <div class="school-tier">
      <h3 class="school-tier-title">Middle School</h3>
      <div class="events-grid">
        <event-card
          school="Middle School"
          date="May 28, 2025"
          title="Spring Book Fair"
          location="Middle school library"
          description="Shop for books and support classroom libraries. Volunteers needed for setup and checkout.">
        </event-card>
        <event-card
          school="Middle School"
          date="June 5, 2025"
          title="8th Grade Celebration"
          location="Middle school gym"
          description="Honoring our graduating eighth graders before they head to high school.">
        </event-card>
      </div>
    </div>

    <div class="school-tier">
      <h3 class="school-tier-title">High School</h3>
      <div class="events-grid">
        <event-card
          school="High School"
          date="June 12, 2025"
          title="Family Fun Night"
          location="High school stadium"
          description="Games, food, and community fun for all ages. Bring the whole family.">
        </event-card>
        <event-card
          school="High School"
          date="September 10, 2025"
          title="First PTA meeting of the year"
          location="High school library"
          description="Meet other parents, hear from administrators, and help plan the year ahead.">
        </event-card>
      </div>
    </div>

    <div class="school-tier school-tier-shared">
      <h3 class="school-tier-title">Both campuses</h3>
      <div class="events-grid events-grid-single">
        <event-card
          school=""
          date="August 28, 2025"
          title="Back-to-school welcome social"
          location="District campus green"
          description="Kick off the year together — meet PTA leaders from middle and high school in one place.">
        </event-card>
      </div>
    </div>
    </div>
  </div>
</section>
